<script type="module">
  const API_BASE = '';

  // --- Tabs ---
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm', 'font-semibold');
        t.classList.add('text-on-surface-variant', 'font-medium');
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm', 'font-semibold');
      tab.classList.remove('text-on-surface-variant', 'font-medium');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // --- Dropzone ---
  function setupDropzone(zoneId, inputId, nameId, submitId, onFile) {
    const zone = document.getElementById(zoneId);
    const inp = document.getElementById(inputId);
    const nameEl = document.getElementById(nameId);
    const btn = document.getElementById(submitId);

    function handleFile(file) {
      nameEl.textContent = file.name;
      btn.disabled = false;
      if (onFile) onFile(file);
    }

    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        inp.files = e.dataTransfer.files;
        handleFile(e.dataTransfer.files[0]);
      }
    });
    inp.addEventListener('change', () => { if (inp.files[0]) handleFile(inp.files[0]); });
  }

  const TAB_CFG = {
    doc:   { fields: ['docTitle', 'docDomain', 'docDesc', 'docTags'], status: 'docAiStatus' },
    video: { fields: ['vidTitle', 'vidDomain', 'vidDesc', 'vidTags'], status: 'vidAiStatus' },
    yt:    { fields: ['ytTitle',  'ytDomain',  'ytDesc',  'ytTags'],  status: 'ytAiStatus' },
  };
  const ALL_AI_FIELDS = Object.values(TAB_CFG).flatMap(c => c.fields);
  const ALL_MARK_CLASSES = ['ai-filled', 'yt-filled'];

  function setMarkedField(id, value, source = 'ai') {
    const el = document.getElementById(id);
    if (!el || !value || String(value).length === 0) return false;
    if (el.value && el.value.trim()) return false;
    el.value = value;
    el.classList.add(source === 'yt' ? 'yt-filled' : 'ai-filled');
    const badge = document.querySelector(`.ai-badge[data-badge-for="${id}"]`);
    if (badge) badge.classList.remove('hidden');
    return true;
  }

  function clearMark(id) {
    const el = document.getElementById(id);
    if (!el) return;
    ALL_MARK_CLASSES.forEach(c => el.classList.remove(c));
    const badge = document.querySelector(`.ai-badge[data-badge-for="${id}"]`);
    if (badge) badge.classList.add('hidden');
  }

  ALL_AI_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => clearMark(id));
    el.addEventListener('change', () => clearMark(id));
  });

  function resetTabState(tab) {
    const cfg = TAB_CFG[tab];
    if (!cfg) return;
    cfg.fields.forEach(id => {
      const el = document.getElementById(id);
      if (el && ALL_MARK_CLASSES.some(c => el.classList.contains(c))) el.value = '';
      clearMark(id);
    });
    const s = document.getElementById(cfg.status);
    if (s) { s.className = 'ai-status'; s.textContent = ''; }
    if (tab === 'yt') {
      const t = document.getElementById('ytThumb'); if (t) { t.classList.add('hidden'); t.src = ''; }
      const r = document.getElementById('ytMetaRow'); if (r) r.innerHTML = '';
    }
  }

  function setStatus(tab, text, cls = '') {
    const cfg = TAB_CFG[tab];
    if (!cfg) return;
    const s = document.getElementById(cfg.status);
    if (!s) return;
    s.className = 'ai-status' + (cls ? ' ' + cls : '');
    s.textContent = text;
  }

  async function runDocPreview(file) {
    setStatus('doc', 'Đang phân tích tài liệu để gợi ý mô tả', 'loading');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const resp = await fetch(`${API_BASE}/api/ingest/file/preview`, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (data.status !== 'ok' || !data.metadata) {
        setStatus('doc', data.message || 'Không gen được metadata, vui lòng nhập thủ công.', 'err');
        const t = document.getElementById('docTitle');
        if (t && !t.value) t.value = file.name.replace(/\.[^.]+$/, '');
        return;
      }
      const m = data.metadata;
      const filled = [];
      if (setMarkedField('docTitle', m.title, 'ai')) filled.push('Tiêu đề');
      if (setMarkedField('docDomain', m.domain, 'ai')) filled.push('Lĩnh vực');
      if (setMarkedField('docDesc', m.description, 'ai')) filled.push('Mô tả');
      if (Array.isArray(m.tags) && m.tags.length && setMarkedField('docTags', m.tags.join(', '), 'ai')) filled.push('Thẻ');
      setStatus('doc', filled.length
        ? `✓ Đã gợi ý: ${filled.join(', ')}. Bạn có thể sửa trước khi tải lên.`
        : '✓ Metadata sẵn sàng (các field đã được bạn nhập, không ghi đè).', 'ok');
    } catch (err) {
      setStatus('doc', `Lỗi gen metadata: ${err.message}. Vui lòng nhập thủ công.`, 'err');
      const t = document.getElementById('docTitle');
      if (t && !t.value) t.value = file.name.replace(/\.[^.]+$/, '');
    }
  }

  async function runVideoPreview(file) {
    setStatus('video', 'Đang phiên âm video và phân tích, có thể mất 30s-2 phút…', 'loading');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const resp = await fetch(`${API_BASE}/api/ingest/video/file/preview`, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (data.status !== 'ok' || !data.metadata) {
        setStatus('video', data.message || 'Không gen được metadata, vui lòng nhập thủ công.', 'err');
        const t = document.getElementById('vidTitle');
        if (t && !t.value) t.value = file.name.replace(/\.[^.]+$/, '');
        return;
      }
      const m = data.metadata;
      const filled = [];
      if (setMarkedField('vidTitle', m.title, 'ai')) filled.push('Tiêu đề');
      if (setMarkedField('vidDomain', m.domain, 'ai')) filled.push('Lĩnh vực');
      if (setMarkedField('vidDesc', m.description, 'ai')) filled.push('Mô tả');
      if (Array.isArray(m.tags) && m.tags.length && setMarkedField('vidTags', m.tags.join(', '), 'ai')) filled.push('Thẻ');
      setStatus('video', filled.length
        ? `✓ Đã gợi ý từ transcript: ${filled.join(', ')}.`
        : '✓ Metadata sẵn sàng (các field đã được bạn nhập, không ghi đè).', 'ok');
    } catch (err) {
      setStatus('video', `Lỗi: ${err.message}. Vui lòng nhập thủ công.`, 'err');
      const t = document.getElementById('vidTitle');
      if (t && !t.value) t.value = file.name.replace(/\.[^.]+$/, '');
    }
  }

  function _formatDuration(sec) {
    sec = parseInt(sec || 0);
    if (!sec) return '';
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
  }
  let _ytLastPreviewUrl = '';
  async function runYoutubePreview(url) {
    if (!url || url === _ytLastPreviewUrl) return;
    _ytLastPreviewUrl = url;
    setStatus('yt', 'Đang lấy thông tin YouTube và phân loại lĩnh vực…', 'loading');
    try {
      const resp = await fetch(`${API_BASE}/api/ingest/youtube/preview?url=${encodeURIComponent(url)}`, { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (data.status === 'skip') { setStatus('yt', data.message, 'ok'); return; }
      if (data.status !== 'ok' || !data.metadata) {
        setStatus('yt', data.message || 'Không lấy được metadata.', 'err'); return;
      }
      const m = data.metadata;
      if (m.thumbnail) {
        const img = document.getElementById('ytThumb');
        img.src = m.thumbnail; img.classList.remove('hidden');
      }
      const mr = document.getElementById('ytMetaRow');
      if (mr) {
        const esc = (s) => { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; };
        const bits = [];
        if (m.channel)       bits.push(`<span><strong class="text-on-surface">Kênh:</strong> ${esc(m.channel)}</span>`);
        if (m.duration_sec)  bits.push(`<span><strong class="text-on-surface">Thời lượng:</strong> ${esc(_formatDuration(m.duration_sec))}</span>`);
        mr.innerHTML = bits.join('');
      }
      const filled = [];
      if (setMarkedField('ytTitle', m.title, 'yt')) filled.push('Tiêu đề (YouTube)');
      if (setMarkedField('ytDesc', m.description, 'yt')) filled.push('Mô tả (YouTube)');
      if (setMarkedField('ytDomain', m.domain, 'ai')) filled.push('Lĩnh vực (AI)');
      if (Array.isArray(m.tags) && m.tags.length && setMarkedField('ytTags', m.tags.join(', '), 'ai')) filled.push('Thẻ (AI)');
      setStatus('yt', filled.length
        ? `✓ Đã gợi ý: ${filled.join(', ')}.`
        : '✓ Metadata sẵn sàng (các field đã được bạn nhập, không ghi đè).', 'ok');
    } catch (err) {
      setStatus('yt', `Lỗi: ${err.message}`, 'err');
    }
  }

  setupDropzone('docDropzone', 'docFile', 'docFileName', 'docSubmit', file => {
    resetTabState('doc'); runDocPreview(file);
  });
  setupDropzone('vidDropzone', 'vidFile', 'vidFileName', 'vidSubmit', file => {
    resetTabState('video'); runVideoPreview(file);
  });
  const ytUrlEl = document.getElementById('ytUrl');
  if (ytUrlEl) {
    ytUrlEl.addEventListener('blur', () => {
      const u = ytUrlEl.value.trim();
      if (!u) { resetTabState('yt'); _ytLastPreviewUrl = ''; return; }
      if (u !== _ytLastPreviewUrl) { resetTabState('yt'); runYoutubePreview(u); }
    });
  }

  function setResult(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'result-msg text-center ' + (type || '');
  }

  document.getElementById('docSubmit').addEventListener('click', async () => {
    const file = document.getElementById('docFile').files[0];
    if (!file) return;
    const btn = document.getElementById('docSubmit');
    btn.disabled = true;
    setResult('docResult', 'Đang tải lên và lập chỉ mục...', 'pending');

    const fd = new FormData();
    fd.append('file', file);
    fd.append('collection', 'ttt_documents');
    fd.append('title', document.getElementById('docTitle').value);
    fd.append('domain', document.getElementById('docDomain').value);
    fd.append('description', document.getElementById('docDesc').value);
    fd.append('tags', document.getElementById('docTags').value);
    fd.append('url', document.getElementById('docUrl').value);

    try {
      const resp = await fetch(`${API_BASE}/api/ingest/file`, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      setResult('docResult', data.message, data.status === 'ok' ? 'ok' : 'err');
    } catch (err) {
      setResult('docResult', `Lỗi: ${err.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('vidSubmit').addEventListener('click', async () => {
    const file = document.getElementById('vidFile').files[0];
    if (!file) return;
    const btn = document.getElementById('vidSubmit');
    btn.disabled = true;
    setResult('vidResult', 'Đang tải lên và phiên âm... (có thể mất vài phút)', 'pending');

    const fd = new FormData();
    fd.append('file', file);
    fd.append('collection', 'ttt_videos');
    fd.append('title', document.getElementById('vidTitle').value);
    fd.append('domain', document.getElementById('vidDomain').value);
    fd.append('description', document.getElementById('vidDesc').value);
    fd.append('tags', document.getElementById('vidTags').value);

    try {
      const resp = await fetch(`${API_BASE}/api/ingest/video/file`, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      setResult('vidResult', data.message, data.status === 'ok' ? 'ok' : 'err');
    } catch (err) {
      setResult('vidResult', `Lỗi: ${err.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('ytSubmit').addEventListener('click', async () => {
    const url = document.getElementById('ytUrl').value.trim();
    if (!url) { setResult('ytResult', 'Vui lòng nhập URL YouTube.', 'err'); return; }
    const btn = document.getElementById('ytSubmit');
    btn.disabled = true;
    setResult('ytResult', 'Đang xử lý...', 'pending');

    const fd = new FormData();
    fd.append('title', document.getElementById('ytTitle').value);
    fd.append('domain', document.getElementById('ytDomain').value);
    fd.append('description', document.getElementById('ytDesc').value);
    fd.append('tags', document.getElementById('ytTags').value);

    try {
      const resp = await fetch(
        `${API_BASE}/api/ingest/youtube?url=${encodeURIComponent(url)}`,
        { method: 'POST', body: fd },
      );
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      setResult('ytResult', data.message, data.status === 'ok' ? 'ok' : 'err');
      if (data.status === 'ok') {
        document.getElementById('ytUrl').value = '';
        resetTabState('yt');
        _ytLastPreviewUrl = '';
      }
    } catch (err) {
      setResult('ytResult', `Lỗi: ${err.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
